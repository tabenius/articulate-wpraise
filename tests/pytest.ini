[pytest]
# Pytest configuration for Articulate MCP Server tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings
    --color=yes

# Markers
markers =
    auth: Authentication tests
    profile: Profile management tests
    organizations: Organization tests
    invites: Invite system tests
    connections: WordPress connection tests
    upload: File upload tests
    cleanup: Cleanup tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(levelname)s: %(message)s

# Coverage (if pytest-cov is installed)
# addopts = --cov=articulate_mcp --cov-report=html --cov-report=term

# Test execution order
# Run cleanup tests last
testpaths = .
