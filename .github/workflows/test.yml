name: Test MCP Server

on:
  push:
    branches: [main]
    paths:
      - 'mcp-server/**'
      - 'docker/mcp-server/**'
      - 'templates/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mcp-server/**'
      - 'docker/mcp-server/**'
      - 'templates/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build MCP server image
        run: |
          docker build \
            -f docker/mcp-server/Dockerfile \
            -t wp-ai-mcp-test \
            .

      - name: Run tests in container
        run: |
          docker run --rm \
            -e SKIP_DB_TESTS=1 \
            wp-ai-mcp-test \
            python -m pytest tests/ -v --tb=short
