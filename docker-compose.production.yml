# Production Docker Compose Configuration
# This file removes exposed ports for internal services and uses Docker networks for isolation

services:
  mariadb:
    image: mariadb:11
    container_name: articulate-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    # NO PORTS EXPOSED - internal only
    networks:
      - articulate-internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: articulate-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # NO PORTS EXPOSED - internal only
    networks:
      - articulate-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  wordpress:
    build:
      context: ./docker/wordpress
      dockerfile: Dockerfile
    container_name: articulate-wordpress
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_CHARSET: utf8mb4
      WORDPRESS_DB_COLLATE: utf8mb4_unicode_ci
      # Production: Set WordPress URLs for your domain
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', '${WP_DOMAIN}');
        define('WP_SITEURL', '${WP_DOMAIN}');
        define('FORCE_SSL_ADMIN', true);
    volumes:
      - wp_data:/var/www/html
      - ssh_keys:/home/wpuser/.ssh
      - dropbear_keys:/etc/dropbear
    ports:
      - "127.0.0.1:8080:80"  # Only accessible from localhost for reverse proxy
      - "127.0.0.1:2222:2222"  # SSH via dropbear, localhost only
    networks:
      - articulate-internal
      - articulate-proxy

  wp-setup:
    build:
      context: ./docker/wordpress
      dockerfile: Dockerfile
    container_name: articulate-setup
    depends_on:
      - wordpress
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_PASS: ${WP_ADMIN_PASS}
    volumes:
      - wp_data:/var/www/html
    entrypoint: ["/usr/local/bin/wp-setup.sh"]
    restart: "no"
    networks:
      - articulate-internal

  mcp-server:
    build:
      context: .
      dockerfile: docker/mcp-server/Dockerfile
    container_name: articulate-mcp
    restart: unless-stopped
    depends_on:
      - wordpress
      - redis
      - mariadb
    environment:
      WP_URL: http://wordpress:80
      WP_GRAPHQL_ENDPOINT: http://wordpress:80/graphql
      WP_USER: ${WP_ADMIN_USER}
      WP_APP_PASSWORD: ${WP_APP_PASSWORD:-}
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MYSQL_HOST: mariadb
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./templates:/app/templates:ro
      - ./tenants:/app/tenants
    ports:
      - "127.0.0.1:8000:8000"  # Only accessible from localhost for Next.js server
    networks:
      - articulate-internal
      - articulate-proxy
      - proxy_net
      - control_net

  celery-worker:
    build:
      context: .
      dockerfile: docker/mcp-server/Dockerfile
    container_name: articulate-celery
    restart: unless-stopped
    depends_on:
      - redis
      - wordpress
    environment:
      WP_URL: http://wordpress:80
      WP_GRAPHQL_ENDPOINT: http://wordpress:80/graphql
      WP_USER: ${WP_ADMIN_USER}
      WP_APP_PASSWORD: ${WP_APP_PASSWORD:-}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A wp_mcp.tasks worker --loglevel=info
    volumes:
      - wp_data:/var/www/html
    networks:
      - articulate-internal

  celery-beat:
    build:
      context: .
      dockerfile: docker/mcp-server/Dockerfile
    container_name: articulate-celery-beat
    restart: unless-stopped
    depends_on:
      - redis
      - wordpress
    environment:
      WP_URL: http://wordpress:80
      WP_GRAPHQL_ENDPOINT: http://wordpress:80/graphql
      WP_USER: ${WP_ADMIN_USER}
      WP_APP_PASSWORD: ${WP_APP_PASSWORD:-}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A wp_mcp.tasks beat --loglevel=info
    volumes:
      - wp_data:/var/www/html
    networks:
      - articulate-internal

  # Next.js frontend
  webedit:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: articulate-webedit
    restart: unless-stopped
    depends_on:
      - mcp-server
    environment:
      MCP_SERVER_URL: http://mcp-server:8000
      DEFAULT_WP_NAME: ${DEFAULT_WP_NAME:-ragbaz.xyz WordPress}
      DEFAULT_WP_URL: http://wordpress:80
      DEFAULT_WP_GRAPHQL_ENDPOINT: http://wordpress:80/graphql
      DEFAULT_WP_USER: ${WP_ADMIN_USER}
      DEFAULT_WP_APP_PASSWORD: ${WP_APP_PASSWORD}
    ports:
      - "127.0.0.1:4500:3000"  # Only accessible from localhost for reverse proxy
    networks:
      - articulate-internal
      - articulate-proxy

  # Documentation site
  docs:
    build:
      context: ./docs-site
      dockerfile: Dockerfile
    container_name: articulate-docs
    restart: unless-stopped
    ports:
      - "127.0.0.1:8091:80"  # Only accessible from localhost for reverse proxy
    networks:
      - articulate-proxy

  # Caddy reverse proxy with automatic HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: articulate-caddy
    restart: unless-stopped
    depends_on:
      - wordpress
      - webedit
      - mcp-server
      - docs
    ports:
      - "127.0.0.1:4555:80"    # HTTP (HAProxy uses port 80, so Caddy uses 4555)
      - "127.0.0.1:4556:443"   # HTTPS (HAProxy uses 443, so Caddy uses 4556)
      - "127.0.0.1:4556:443/udp"  # HTTP/3
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-ragbaz.xyz}
    networks:
      - articulate-internal  # Access to WordPress, MCP, and other internal services
      - articulate-proxy     # Receive traffic from HAProxy/external
      - proxy_net            # Access to tenant services

networks:
  # Internal network - not accessible from outside
  articulate-internal:
    driver: bridge
    internal: true

  # Proxy network - only services that need external access
  articulate-proxy:
    driver: bridge

  # Shared networks for multi-tenant routing
  proxy_net:
    name: proxy_net
    driver: bridge
  control_net:
    name: control_net
    driver: bridge

volumes:
  db_data:
  wp_data:
  redis_data:
  caddy_data:
  caddy_config:
  ssh_keys:
  dropbear_keys:
